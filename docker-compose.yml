services:

  # ── Kalshi API (always-on, behind nginx) ──────────────
  api:
    build: .
    container_name: kalshi_scrapper_api
    restart: always
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shift
      DB_USER: shift_user
      DB_PASS: ${DB_PASS:-change_me_strong_password}
      DB_SSLMODE: disable
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_DRY_RUN: ${ALERT_DRY_RUN:-1}
    ports:
      - "127.0.0.1:8000:8000"
    command: ["uvicorn", "src.api.kalshi_api:app", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - shift_net

  # ── Polymarket API (always-on, behind nginx) ──────────
  poly_api:
    build: .
    container_name: poly_api
    restart: always
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shift
      DB_USER: shift_user
      DB_PASS: ${DB_PASS:-change_me_strong_password}
      DB_SSLMODE: disable
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_DRY_RUN: ${ALERT_DRY_RUN:-1}
    ports:
      - "127.0.0.1:8001:8001"
    command: ["uvicorn", "src.api.poly_api:app", "--host", "0.0.0.0", "--port", "8001", "--root-path", "/poly"]
    networks:
      - shift_net

  # ── Kalshi Exporter (cron-triggered, exits after run) ─
  kalshi_export:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      ENABLE_MARKET_SNAPSHOT: "1"
      EXPORT_SOURCE: ec2
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shift
      DB_USER: shift_user
      DB_PASS: ${DB_PASS:-change_me_strong_password}
      DB_SSLMODE: disable
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_DRY_RUN: ${ALERT_DRY_RUN:-1}
    volumes:
      - /home/ubuntu/apps/KalshiV2/src/auth/secrets/kalshi_private_key.pem:/app/src/auth/secrets/kalshi_private_key.pem:ro
    command: ["python", "-m", "src.data.db_export_open_markets"]
    restart: "no"
    networks:
      - shift_net

  # ── Polymarket Exporter (cron-triggered, exits after run)
  poly_export:
    build: .
    env_file:
      - .env
    environment:
      PYTHONPATH: /app
      ENABLE_MARKET_SNAPSHOT: "1"
      EXPORT_SOURCE: ec2
      DB_HOST: db
      DB_PORT: "5432"
      DB_NAME: shift
      DB_USER: shift_user
      DB_PASS: ${DB_PASS:-change_me_strong_password}
      DB_SSLMODE: disable
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      ALERT_FROM_EMAIL: ${ALERT_FROM_EMAIL:-}
      ALERT_DRY_RUN: ${ALERT_DRY_RUN:-1}
    command: ["python", "-m", "src.data.db_export_poly_markets"]
    restart: "no"
    networks:
      - shift_net

networks:
  shift_net:
    external: true